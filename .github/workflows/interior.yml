name: interior
on:
  push:
    branches: [ "main" ]

jobs:
    jungle:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: jungle
          run: |
            npm install
            timeout 339m node interior.js
  
