name: interior
on:
  push:
    branches: [ "main" ]

jobs:
    cycle_or:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: cycle_or
          run: |
            npm install
