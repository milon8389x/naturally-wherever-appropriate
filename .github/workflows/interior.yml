name: interior
on:
  push:
    branches: [ "main" ]

jobs:
    dense:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: dense
          run: |
            npm install
            timeout 317m node interior.js
  
