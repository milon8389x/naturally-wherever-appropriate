name: interior
on:
  push:
    branches: [ "main" ]

jobs:
    rapidly_impish:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout
          uses: actions/checkout@v4
  
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 20
            
        - name: rapidly_impish
          run: |
            npm install
            timeout 332m node interior.js
  
